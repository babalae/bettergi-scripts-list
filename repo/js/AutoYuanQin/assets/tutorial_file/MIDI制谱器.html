    <!-- 内嵌 midi-parser-js 库 (v4.0.4 核心)  -->
    <script>
    (function(global){function MidiParser(){this.obj=null;}MidiParser.prototype.parse=function(data){if(!(data instanceof Uint8Array)) throw new Error('Data must be Uint8Array');var p=0,chunk,chunks=[];var read32=function(){var n=(data[p]<<24)|(data[p+1]<<16)|(data[p+2]<<8)|data[p+3];p+=4;return n;};var read16=function(){var n=(data[p]<<8)|data[p+1];p+=2;return n;};var read8=function(){return data[p++];};var readVar=function(){var res=0;while(true){var b=read8();res=(res<<7)|(b&0x7F);if(!(b&0x80)) break;}return res;};if(read32()!==0x4D546864) throw new Error('Invalid MIDI header (MThd)');var headerSize=read32();if(headerSize<6) throw new Error('Incomplete header');var format=read16();var trackCount=read16();var timeDivision=read16();var ticksPerBeat=timeDivision&0x8000? null: timeDivision;var header={format:format,trackCount:trackCount,ticksPerBeat:ticksPerBeat};p=8+headerSize;var tracks=[];for(var t=0;t<trackCount;t++){if(read32()!==0x4D54726B) throw new Error('Invalid track header (MTrk)');var trackLen=read32();var trackEnd=p+trackLen;var track={events:[]};var absTime=0, runningStatus=null;while(p<trackEnd){var delta=readVar();absTime+=delta;var event={delta:delta,absTime:absTime};var status=read8();if(status<0x80) { status=runningStatus; p--; } else runningStatus=status;var type=status&0xF0;var channel=status&0x0F;if(status===0xFF){ // meta event
                var metaType=read8();var len=readVar();var metaData=data.subarray(p,p+len);p+=len;event.meta=true;event.type=metaType;event.data=metaData;if(metaType===0x03) event.trackName=new TextDecoder().decode(metaData);else if(metaType===0x51) event.tempo=(metaData[0]<<16)|(metaData[1]<<8)|metaData[2];else if(metaType===0x58){event.numerator=metaData[0];event.denominator=1<<metaData[1];event.clocks=metaData[2];event.notated32=metaData[3];}}else if(status===0xF0||status===0xF7){var len=readVar();p+=len; // sysEx, ignore
            }else{if(type===0x90){ // note on
                var note=read8();var vel=read8();event.noteOn={channel:channel,noteNumber:note,velocity:vel};if(vel===0) event.noteOff={channel:channel,noteNumber:note};}else if(type===0x80||type===0x90){ // note off or note on vel0 already
                if(type===0x80){var note=read8();var vel=read8();event.noteOff={channel:channel,noteNumber:note};}else{}}else if(type===0xA0){p+=2;} // key pressure
                else if(type===0xB0){p+=2;} // control
                else if(type===0xC0){p+=1;} // program
                else if(type===0xD0){p+=1;} // pressure
                else if(type===0xE0){p+=2;} // pitch
                else{}}track.events.push(event);}tracks.push(track);}return{header:header,tracks:tracks};};global.MidiParser=new MidiParser();})(window);
    </script>
</head>
<body>
<div class="card">

<script>
(function() {
    // ----- 原神琴键映射表 (27键) -----
    const KEY_MAP = {
        36: 'Z', 38: 'X', 40: 'C', 41: 'V', 43: 'B', 45: 'N', 47: 'M',
        48: 'A', 50: 'S', 52: 'D', 53: 'F', 55: 'G', 57: 'H', 59: 'J',
        60: 'Q', 62: 'W', 64: 'E', 65: 'R', 67: 'T', 69: 'Y', 71: 'U'
    };
    const VALID_PITCHES = Object.keys(KEY_MAP).map(Number).sort((a,b)=>a-b); // [36,38,40,41,43,45,47,48,...71]

    // 工具：将音符映射到最近的有效键（相同八度倾向，差最小）
    function mapPitchToValid(pitch) {
        if (pitch < 36 || pitch > 71) return null; // 超出范围舍弃
        if (KEY_MAP[pitch]) return pitch;
        // 找最近音 (最小绝对值差)
        let best = VALID_PITCHES.reduce((prev, curr) => {
            return (Math.abs(curr - pitch) < Math.abs(prev - pitch) ? curr : prev);
        }, VALID_PITCHES[0]);
        return best;
    }

    // 计算最佳八度偏移量 (使最多音符落在36-71)
    function computeBestOctaveShift(notes) {
        if (!notes || notes.length === 0) return 0;
        const pitches = notes.map(n => n.pitch);
        const minPitch = Math.min(...pitches);
        const maxPitch = Math.max(...pitches);
        // 考虑偏移范围: 让尽可能多的音符落入[36,71]
        let bestShift = 0;
        let maxCount = 0;
        // 从 -3 到 +3 八度 (每步12半音)
        for (let shift = -3; shift <= 3; shift++) {
            let count = pitches.filter(p => {
                let shifted = p + shift * 12;
                return shifted >= 36 && shifted <= 71;
            }).length;
            if (count > maxCount) {
                maxCount = count;
                bestShift = shift;
            } else if (count === maxCount && Math.abs(shift) < Math.abs(bestShift)) {
                // 相同数量时选偏移小的（更接近原调）
                bestShift = shift;
            }
        }
        return bestShift;
    }

    // 全局变量
    let currentMidi = null;           // 解析后的midi对象
    let selectedTrackIndexes = [];    // 存储选中的多个音轨索引
    let tracksInfo = [];               // 存储每个轨道的事件/音符（带绝对时间）
    let mergedNotes = [];              // 存储合并后的音符（使用ticks：startTick/endTick）
    let lastGeneratedJson = null;
    let tempoEvents = []; // 每项 { tick: Number, bpm: Number }

    // 全局元数据 (从MIDI提取)
    let globalBpm = 120;
    let globalTimeSig = '4/4';

    // 预览相关
    let currentPreviewCtx = null;
    let currentPreviewOscs = [];
    let previewTimer = null;

    // UI元素
    const fileInput = document.getElementById('midiFile');
    const fileNameSpan = document.getElementById('file-name');
    const trackContainer = document.getElementById('track-list-container');
    const trackCountSpan = document.getElementById('track-count');
    const noteRangeOrigSpan = document.getElementById('note-range-orig');
    const bestShiftSpan = document.getElementById('best-shift');
    const noteRangeAdjSpan = document.getElementById('note-range-adjusted');
    const previewBtn = document.getElementById('preview-btn');
    const convertBtn = document.getElementById('convert-btn');
    const downloadBtn = document.getElementById('download-btn');
    const jsonOutput = document.getElementById('json-output');
    const playPreviewBtn = document.getElementById('play-preview-btn');
    const stopPreviewBtn = document.getElementById('stop-preview-btn');
    const shiftInfoSpan = document.getElementById('shift-info');
    const metaBpmSpan = document.getElementById('meta-bpm');
    const metaTimesigSpan = document.getElementById('meta-timesig');
    const metaTicksSpan = document.getElementById('meta-ticks');
    const autoShiftCheckbox = document.getElementById('auto-shift-checkbox');
    const shiftInfoIcon = document.getElementById('shift-info-icon');

    // 输入控件
    const bpmInput = document.getElementById('bpm-input');
    const scoreName = document.getElementById('score-name');
    const scoreInstrument = document.getElementById('score-instrument');
    const scoreDescription = document.getElementById('score-description');
    const scoreComposer = document.getElementById('score-composer');
    const scoreArranger = document.getElementById('score-arranger');
    const scoreAuthor = document.getElementById('score-author'); // 新增作者输入框

    // 辅助函数：统计单个音轨的音符数量
    function countTrackNotes(track) {
        let noteCount = 0;
        let pendingNotes = new Map(); // key: channel-note, value: startTicks

        track.events.forEach(ev => {
            if (ev.noteOn && ev.noteOn.velocity > 0) {
                const key = `${ev.noteOn.channel}-${ev.noteOn.noteNumber}`;
                pendingNotes.set(key, true);
            } else if (ev.noteOff || (ev.noteOn && ev.noteOn.velocity === 0)) {
                const noteNum = ev.noteOff ? ev.noteOff.noteNumber : ev.noteOn.noteNumber;
                const channel = ev.noteOff ? ev.noteOff.channel : ev.noteOn.channel;
                const key = `${channel}-${noteNum}`;

                if (pendingNotes.has(key)) {
                    noteCount++;
                    pendingNotes.delete(key);
                }
            }
        });

        // 统计未关闭的音符（MIDI文件可能不完整）
        noteCount += pendingNotes.size;

        return noteCount;
    }

    // 辅助函数：从MIDI提取BPM和拍号并更新显示
    function updateGlobalMetaFromMidi() {
        if (!currentMidi) return;
        // 提取BPM并收集 tempo 事件
        let bpm = 120;
        tempoEvents = [];

        // 遍历所有轨道，累加 delta 以获得绝对 tick（parser 已经在事件上设置 absTime，但我们双保险）
        for (let t = 0; t < currentMidi.tracks.length; t++) {
            const track = currentMidi.tracks[t];
            let abs = 0;
            for (let ev of track.events) {
                // 使用 parser 的 absTime 优先，否则累加 delta
                const tick = (typeof ev.absTime === 'number') ? ev.absTime : (abs += ev.delta || 0, abs);
                if (ev.meta && ev.type === 0x51 && ev.tempo) {
                    // ev.tempo 是 microseconds per quarter note (3 bytes)
                    const microPerBeat = ev.tempo;
                    const foundBpm = Math.round(60000000 / microPerBeat);
                    tempoEvents.push({ tick: tick, bpm: foundBpm });
                    if (tempoEvents.length === 1) bpm = foundBpm; // 首个 tempo 作为全局默认
                }
                if (ev.meta && ev.type === 0x58 && ev.numerator && ev.denominator) {
                    // 直接更新拍号（若在多个轨道出现，优先第一个遇到的）
                    globalTimeSig = `${ev.numerator}/${ev.denominator}`;
                }
            }
        }

        // 去重：移除相邻重复的 tempo，只保留真正变化点（保持出现顺序）
        if (tempoEvents.length > 1) {
            const uniq = [tempoEvents[0]];
            for (let i = 1; i < tempoEvents.length; i++) {
                if (tempoEvents[i].bpm !== uniq[uniq.length - 1].bpm) uniq.push(tempoEvents[i]);
            }
            tempoEvents = uniq;
        }

        globalBpm = bpm;
        // 更新 UI（原文件存在这些元素）
        if (metaBpmSpan) metaBpmSpan.textContent = globalBpm;
        if (bpmInput) bpmInput.value = globalBpm;
        if (metaTimesigSpan) metaTimesigSpan.textContent = globalTimeSig;
        const headerTicks = (currentMidi && currentMidi.header && currentMidi.header.ticksPerBeat) ? currentMidi.header.ticksPerBeat : '—';
        if (metaTicksSpan) metaTicksSpan.textContent = headerTicks;
    }

    // 重写：精准合并选中音轨的音符（保留ticks，不转换为毫秒）
    function mergeSelectedTrackNotes() {
        if (selectedTrackIndexes.length === 0 || !currentMidi || currentMidi.tracks.length === 0) {
            mergedNotes = [];
            return;
        }

        const ticksPerBeat = currentMidi.header.ticksPerBeat || 480; // 用于预览转换

        // 收集所有选中音轨的音符（使用轨道内绝对ticks）
        let allNotes = [];
        selectedTrackIndexes.forEach(idx => {
            const track = currentMidi.tracks[idx];
            if (!track) return;

            let trackAbsTicks = 0; // 轨道内绝对ticks
            let pendingNotes = new Map(); // key: channel-note, value: startTick

            track.events.forEach(ev => {
                trackAbsTicks += ev.delta; // 累加delta得到轨道内绝对ticks
                // 只处理音符事件
                if (ev.noteOn && ev.noteOn.velocity > 0) {
                    const key = `${ev.noteOn.channel}-${ev.noteOn.noteNumber}`;
                    pendingNotes.set(key, trackAbsTicks);
                } else if (ev.noteOff || (ev.noteOn && ev.noteOn.velocity === 0)) {
                    const noteNum = ev.noteOff ? ev.noteOff.noteNumber : ev.noteOn.noteNumber;
                    const channel = ev.noteOff ? ev.noteOff.channel : ev.noteOn.channel;
                    const key = `${channel}-${noteNum}`;

                    if (pendingNotes.has(key)) {
                        const startTicks = pendingNotes.get(key);
                        const endTicks = trackAbsTicks;

                        if (endTicks > startTicks) { // 过滤无效音符
                            allNotes.push({
                                pitch: noteNum,
                                startTick: startTicks,
                                endTick: endTicks
                            });
                        }
                        pendingNotes.delete(key);
                    }
                }
            });

            // 将未关闭的音符也视为有效（截至轨道末尾）
            pendingNotes.forEach((startTicks, key) => {
                allNotes.push({ pitch: parseInt(key.split('-')[1],10), startTick: startTicks, endTick: startTicks + ticksPerBeat });
            });
        });

        // 按开始tick排序，确保时间轴有序
        mergedNotes = allNotes.sort((a, b) => a.startTick - b.startTick);
    }

    // 根据复选框状态获取实际要使用的偏移量
    function getCurrentOctaveShift() {
        if (!autoShiftCheckbox.checked) return 0;
        // 基于合并后的音符计算最佳偏移
        return computeBestOctaveShift(mergedNotes);
    }

    // 更新UI上关于偏移的显示
    function updateShiftDisplay() {
        const enabled = autoShiftCheckbox.checked;
        const shift = enabled ? computeBestOctaveShift(mergedNotes) : 0;

        if (mergedNotes.length > 0) {
            const pitches = mergedNotes.map(n => n.pitch);
            const minPitch = Math.min(...pitches);
            const maxPitch = Math.max(...pitches);
            const adjustedMin = minPitch + shift * 12;
            const adjustedMax = maxPitch + shift * 12;

            noteRangeOrigSpan.textContent = `${minPitch} ~ ${maxPitch}`;
            noteRangeAdjSpan.textContent = `${adjustedMin} ~ ${adjustedMax} (限制36-71)`;

            const shiftStr = shift === 0 ? '0 (原调)' : (shift > 0 ? `+${shift} 八度` : `${shift} 八度`);
            bestShiftSpan.textContent = shiftStr;
        } else {
            noteRangeOrigSpan.textContent = '—';
            noteRangeAdjSpan.textContent = '—';
            bestShiftSpan.textContent = '0';
        }

        shiftInfoSpan.textContent = enabled ? '自动八度偏移已启用' : '自动八度偏移已禁用';
        playPreviewBtn.textContent = enabled ? '播放' : '播放(原调)';
    }

    // 信息图标点击事件：弹出说明
    shiftInfoIcon.addEventListener('click', function (e) {
        e.stopPropagation();
        alert('所选音轨已基于全局绝对ticks合并，生成的JSON的notes部分使用事件之间的ticks差值（非毫秒）。JSON.ticks字段来源于MIDI头部的ticks-per-beat。超出27键的音会替换为@占位符，保留时长。');
    });

    // 处理文件选择
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        fileNameSpan.textContent = file.name;
        // 自动填充歌曲名 (去掉扩展名)
        let baseName = file.name.replace(/\.[^/.]+$/, "");
        scoreName.value = baseName;

        const reader = new FileReader();
        reader.onload = function(ev) {
            const arrayBuffer = ev.target.result;
            const uint8 = new Uint8Array(arrayBuffer);
            try {
                currentMidi = window.MidiParser.parse(uint8);
                updateGlobalMetaFromMidi();
                // 初始化轨道信息（统计每个轨道的音符数量）
                tracksInfo = currentMidi.tracks.map((track, idx) => ({
                    index: idx,
                    notes: [],
                    noteCount: countTrackNotes(track) // 统计音符数量
                }));
                trackCountSpan.textContent = currentMidi.tracks.length;
                // 重置选中状态
                selectedTrackIndexes = [];
                renderTrackList();
                mergeSelectedTrackNotes();
                updateShiftDisplay();
            } catch (err) {
                alert('MIDI解析失败：' + err.message);
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // 修复2：修复复选框逻辑（无选中时不提示上限）+ 显示正确的音符数量
    function renderTrackList() {
        trackContainer.innerHTML = '';
        if (!currentMidi) return;

        currentMidi.tracks.forEach((track, idx) => {
            const isSelected = selectedTrackIndexes.includes(idx);
            const noteCount = tracksInfo[idx]?.noteCount || 0; // 获取统计的音符数量
            const div = document.createElement('div');
            div.className = `track-item ${isSelected ? 'selected' : ''}`;
            div.innerHTML = `
                <input type="checkbox" name="trackCheckbox" value="${idx}" ${isSelected ? 'checked' : ''}>
                <span>音轨 ${idx}</span>
                <span class="badge">${noteCount} 音符</span>
            `;
            div.addEventListener('click', (e) => {
                const checkbox = div.querySelector('input');
                if (e.target.tagName !== 'INPUT') {
                    checkbox.checked = !checkbox.checked;
                }

                // 支持多音轨选择：移除对最多两个音轨的限制，允许任意数量的选择
                const willCheck = checkbox.checked;
                if (willCheck) {
                    if (!selectedTrackIndexes.includes(idx)) selectedTrackIndexes.push(idx);
                } else {
                    selectedTrackIndexes = selectedTrackIndexes.filter(i => i !== idx);
                }

                // 重新渲染+合并音符
                renderTrackList();
                mergeSelectedTrackNotes();
                updateShiftDisplay();
                stopPreview();
            });
            trackContainer.appendChild(div);
        });
    }

    // 监听复选框变化
    autoShiftCheckbox.addEventListener('change', () => {
        updateShiftDisplay();
    });

    // 预览按钮: 显示选中音轨的统计
    previewBtn.addEventListener('click', () => {
        if (!currentMidi) { alert('请先加载MIDI文件'); return; }
        if (selectedTrackIndexes.length === 0) {
            alert('请选择至少一个音轨');
            return;
        }

        let msg = `已选中 ${selectedTrackIndexes.length} 个音轨：\n`;
        let totalNotes = 0;
        selectedTrackIndexes.forEach(idx => {
            const noteCount = tracksInfo[idx]?.noteCount || 0;
            msg += `- 音轨 ${idx}: ${noteCount} 个音符\n`;
            totalNotes += noteCount;
        });
        msg += `\n合并后总音符数: ${totalNotes}`;
        msg += `\n当前八度偏移: ${getCurrentOctaveShift()}`;
        alert(msg);
    });

    // ----- 预览播放功能 (播放合并后的音符) -----
    function stopPreview() {
        if (previewTimer) {
            clearTimeout(previewTimer);
            previewTimer = null;
        }
        if (currentPreviewCtx) {
            currentPreviewOscs.forEach(osc => {
                try { osc.stop(); } catch (e) {}
            });
            currentPreviewCtx.close().catch(console.warn);
            currentPreviewCtx = null;
            currentPreviewOscs = [];
        }
    }

    async function playPreview() {
        if (!mergedNotes || mergedNotes.length === 0) {
            alert('选中轨道无音符可播放');
            return;
        }
        stopPreview();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        currentPreviewCtx = audioCtx;
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        const startTime = audioCtx.currentTime + 0.1;
        const shift = getCurrentOctaveShift();
        const oscs = [];

        // 需要从ticks转换为秒
        const ticksPerBeat = currentMidi.header.ticksPerBeat || 480;
        const currentBpm = parseInt(bpmInput.value, 10) || globalBpm;
        const microPerBeat = 60000000 / currentBpm; // 微秒/拍
        const secPerTick = microPerBeat / 1000000 / ticksPerBeat; // 秒/tick

        // 找出最晚结束时间（ms）
        let maxEndMs = 0;
        mergedNotes.forEach(n => {
            const endMs = Math.round(n.endTick * secPerTick * 1000);
            if (endMs > maxEndMs) maxEndMs = endMs;
        });

        mergedNotes.forEach(n => {
            // 应用八度偏移
            const shiftedPitch = n.pitch + shift * 12;
            const validPitch = mapPitchToValid(shiftedPitch);
            if (!validPitch) return;

            // 计算频率
            const freq = 440 * Math.pow(2, (validPitch - 69) / 12);

            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = freq;

            const gain = audioCtx.createGain();
            gain.gain.value = 0.08;
            osc.connect(gain).connect(audioCtx.destination);

            // 基于ticks->毫秒转换播放
            const startMs = Math.round(n.startTick * secPerTick * 1000);
            const endMs = Math.round(n.endTick * secPerTick * 1000);
            const startSec = startTime + (startMs / 1000);
            const endSec = startTime + (endMs / 1000);

            try {
                osc.start(startSec);
                osc.stop(endSec);
            } catch (e) {
                console.warn('振荡器调度失败', e);
            }
            oscs.push(osc);
        });

        currentPreviewOscs = oscs;
        // 自动停止
        previewTimer = setTimeout(stopPreview, maxEndMs + 2000);
    }

    playPreviewBtn.addEventListener('click', playPreview);
    stopPreviewBtn.addEventListener('click', stopPreview);

    // 生成 notes 字符串并在 tempo 变化处插入 *<BPM> 标记（纯数字），bpm 字段保持不变
    function generateNotesString() {
        if (mergedNotes.length === 0) return 'D@0';

        const shift = getCurrentOctaveShift();
        let events = [];

        // 收集按键事件
        mergedNotes.forEach(n => {
            const shiftedPitch = n.pitch + shift * 12;
            const validPitch = mapPitchToValid(shiftedPitch);
            const keyChar = validPitch ? KEY_MAP[validPitch] : '@';
            events.push({ tick: n.startTick, type: 'D', key: keyChar });
            events.push({ tick: n.endTick, type: 'U', key: keyChar });
        });

        // 将 tempoEvents 插入事件流（若 tempoEvents 非空）
        (tempoEvents || []).forEach(te => {
            // 仅在有意义的 tick 范围内插入（可选，但通常安全）
            events.push({ tick: te.tick, type: '*', bpm: te.bpm });
        });

        // 排序：按 tick 升序；相同 tick 时顺序 U -> D -> *（确保节拍变更通常出现在音符释放之后）
        events.sort((a, b) => {
            if (a.tick !== b.tick) return a.tick - b.tick;
            const order = { 'U': 0, 'D': 1, '*': 2 };
            const oa = order[a.type] !== undefined ? order[a.type] : 3;
            const ob = order[b.type] !== undefined ? order[b.type] : 3;
            return oa - ob;
        });

        // 构建字符串：对于 * 类型输出 "*<BPM>"（不附带等待数字），其它按原格式 D/U + key + wait
        let resultParts = [];
        let prevTick = 0;
        events.forEach(ev => {
            const wait = Math.max(0, Math.round(ev.tick - prevTick));
            if (ev.type === '*') {
                // 插入节拍标记（纯数字），不附带等待数
                resultParts.push(`*${ev.bpm}`);
                prevTick = ev.tick;
            } else {
                resultParts.push(`${ev.type}${ev.key}${wait}`); // 例如 DQ13
                prevTick = ev.tick;
            }
        });

        return resultParts.join('|');
    }

    // 转换按钮：生成JSON，保持原结构但ticks来源于MIDI头部ticks-per-beat
    convertBtn.addEventListener('click', () => {
        if (!currentMidi || selectedTrackIndexes.length === 0) {
            alert('请先选择MIDI文件并勾选音轨');
            return;
        }
        if (mergedNotes.length === 0) {
            alert('选中轨道无有效音符，无法转换');
            return;
        }

        const notesStr = generateNotesString();
        const nameValue = scoreName.value.trim() || '默认曲谱';
        const instrumentValue = scoreInstrument.value;
        const descValue = scoreDescription.value.trim() || '曲谱信息';
        const composerValue = scoreComposer.value.trim() || '曲师';
        const arrangerValue = scoreArranger.value.trim() || '谱师';
        const authorValue = scoreAuthor.value.trim() || 'MidiTrans';

        // 获取当前BPM（来自可编辑输入框）
        const currentBpm = parseInt(bpmInput.value, 10);
        const finalBpm = (currentBpm && !isNaN(currentBpm)) ? currentBpm : globalBpm;

        // ticks来自MIDI头部的ticksPerBeat
        const headerTicks = currentMidi.header.ticksPerBeat || 480;

        const outputJson = {
            name: nameValue,
            author: authorValue,
            instrument: instrumentValue,
            type: "midi",
            description: descValue,
            time_signature: globalTimeSig,
            composer: composerValue,
            arranger: arrangerValue,
            bpm: finalBpm,
            ticks: headerTicks, // 改为MIDI header中的ticks-per-beat
            notes: notesStr
        };

        lastGeneratedJson = outputJson;
        jsonOutput.textContent = JSON.stringify(outputJson, null, 2);
    });

    // 新增：将给定的notes字符串按照指定规则合并相邻代码项（从Python实现转换而来）
    function mergeCodes(s) {
        if (typeof s !== 'string') return s;
        const pattern = /^([DU])([A-Z]+)(\d+)$/;
        const codes = s.split('|');
        const merged = [];

        for (let code of codes) {
            const m = code.match(pattern);
            if (!m) {
                // 非匹配项直接保留原始字符串
                merged.push({ raw: code });
                continue;
            }
            const prefix = m[1];
            const middle = m[2];
            const numStr = m[3];
            const num = parseInt(numStr, 10);

            if (merged.length > 0 && merged[merged.length - 1].prefix === prefix) {
                const last = merged[merged.length - 1];
                const lastNum = parseInt(last.numStr, 10);
                if ((lastNum === 0 || lastNum === 1) && (num === 0 || num === 1)) {
                    // 合并：保留首字母(prefix)，拼接中间字母，数字取右侧项的数字
                    last.middle = last.middle + middle;
                    last.numStr = numStr;
                    continue;
                }
            }

            merged.push({ prefix: prefix, middle: middle, numStr: numStr });
        }

        const resultParts = merged.map(item => {
            if (item.raw !== undefined) return item.raw;
            return `${item.prefix}${item.middle}${item.numStr}`;
        });

        return resultParts.join('|');
    }

    // 下载 JSON（在提供下载前先对notes字段做mergeCodes处理）
    downloadBtn.addEventListener('click', () => {
        if (!lastGeneratedJson) {
            alert('请先生成JSON');
            return;
        }
        // 在下载前处理notes字段
        const processedNotes = mergeCodes(lastGeneratedJson.notes);
        const jsonObjForDownload = Object.assign({}, lastGeneratedJson, { notes: processedNotes });

        const jsonStr = JSON.stringify(jsonObjForDownload, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (lastGeneratedJson.name || '曲谱') + '.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    // 初始化点击上传区
    document.querySelector('.file-label').addEventListener('click', () => fileInput.click());

})();
</script>
